<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="여러 숲(SOOP), 치지직 방송을 함께 볼 수 있는 멀티뷰">
    <title>멀티뷰</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { color-scheme: dark; --accent: #7c5cfc; --bg: #000; --panel: #111; --card: #1a1a1a; --border: #333; --text: #e0e0e0; --text-dim: #888; --resize-hit: 14px; --resize-line: 4px; }
        html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        input, select { font-family: inherit; color: inherit; }

        /* Layout: top(main) + bottom(subs + sidebar) */
        .app { display: flex; flex-direction: column; width: 100%; height: 100%; }

        /* Main stream */
        #main-stream { width: 100%; background: #000; flex-shrink: 0; position: relative; }
        #main-stream iframe { width: 100%; height: 100%; border: none; }
        #main-stream.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; }

        /* Top hover bar */
        #top-bar { position: absolute; top: 0; left: 0; right: 0; z-index: 50; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%); padding: 8px 12px; display: flex; align-items: center; gap: 8px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        #main-stream:hover #top-bar, #top-bar:hover { opacity: 1; pointer-events: auto; }
        #top-bar input { padding: 6px 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; font-size: 13px; color: #fff; outline: none; width: 260px; }
        #top-bar input:focus { border-color: var(--accent); }
        #top-bar button { padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: 600; }
        #top-bar .tb-add { background: var(--accent); color: #fff; }
        #top-bar .tb-add:hover { filter: brightness(1.15); }
        #top-bar .tb-reset { background: rgba(255,255,255,0.1); color: #ccc; margin-left: auto; }
        #top-bar .tb-reset:hover { background: #f44; color: #fff; }

        /* Horizontal resize handle (between main and bottom) */
        #h-resize { position: relative; width: 100%; height: var(--resize-hit); cursor: row-resize; flex-shrink: 0; background: transparent; touch-action: none; }
        #h-resize::before { content: ''; position: absolute; inset: 50% 0 auto; height: var(--resize-line); transform: translateY(-50%); background: var(--border); }
        #h-resize:hover::before, #h-resize.active::before { background: var(--accent); }

        /* Bottom section: subs + sidebar side by side */
        #bottom-section { flex: 1; display: flex; min-height: 0; }
        #bottom-section.sidebar-left { flex-direction: row-reverse; }

        /* Sub streams */
        #sub-streams { display: flex; flex-wrap: wrap; align-items: center; align-content: center; justify-content: center; flex: 1; background: #000; min-width: 0; min-height: 0; }
        #sub-streams .sub-slot { position: relative; flex-grow: 0; }
        #sub-streams .sub-slot iframe { width: 100%; height: 100%; border: none; display: block; }
        #sub-streams .sub-slot .sub-toolbar { position: absolute; top: 0; left: 0; right: 0; z-index: 2; display: flex; align-items: center; gap: 4px; padding: 4px 6px; background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%); opacity: 0; transition: opacity 0.15s; pointer-events: none; }
        #sub-streams .sub-slot:hover .sub-toolbar { opacity: 1; pointer-events: auto; }
        #sub-streams .sub-slot .sub-toolbar .sub-label { flex: 1; font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: grab; padding: 2px 4px; }
        #sub-streams .sub-slot .sub-toolbar button { background: rgba(0,0,0,0.6); border-radius: 4px; padding: 3px 7px; font-size: 11px; color: #fff; flex-shrink: 0; }
        #sub-streams .sub-slot .sub-toolbar button:hover { background: var(--accent); }
        #sub-streams .sub-slot.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; }
        #sub-streams .sub-slot.dragging { opacity: 0.4; }

        /* Sidebar (in bottom section) */
        #sidebar { width: 350px; display: flex; flex-direction: column; background: var(--panel); flex-shrink: 0; overflow: hidden; position: relative; border-left: 1px solid var(--border); }
        #sidebar.collapsed { width: 0 !important; border: none; }
        .sidebar-left #sidebar { border-left: none; border-right: 1px solid var(--border); }

        /* Vertical resize handle (sidebar width) */
        #v-resize { position: absolute; top: 0; width: 10px; height: 100%; cursor: col-resize; z-index: 10; touch-action: none; }
        #v-resize::before { content: ''; position: absolute; inset: 0 auto 0 50%; width: 3px; transform: translateX(-50%); background: transparent; }
        #v-resize:hover::before, #v-resize.active::before { background: var(--accent); opacity: 0.6; }
        /* 기본: 사이드바 오른쪽 → 핸들 왼쪽 */
        #v-resize { left: -5px; }
        .sidebar-left #v-resize { left: auto; right: -5px; }

        /* Sidebar toggle + side switch */
        #sidebar-toggle { position: fixed; bottom: 8px; right: 8px; z-index: 100; background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; font-size: 14px; line-height: 1; display: flex; gap: 6px; align-items: center; }
        #sidebar-toggle button { font-size: 14px; padding: 2px 4px; border-radius: 4px; }
        #sidebar-toggle button:hover { background: #444; }

        /* Channel management panel */
        #channel-panel { display: flex; flex-direction: column; gap: 8px; padding: 8px; border-bottom: 1px solid var(--border); max-height: 50%; overflow-y: auto; flex-shrink: 0; }
        #channel-panel.collapsed-panel { display: none; }
        #panel-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        #panel-toggle-row span { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        #panel-toggle-row button { font-size: 14px; color: var(--text-dim); padding: 2px 6px; border-radius: 4px; }
        #panel-toggle-row button:hover { background: #333; color: var(--text); }

        .input-row { display: flex; gap: 4px; }
        .input-row input { flex: 1; padding: 6px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; font-size: 13px; outline: none; min-width: 0; }
        .input-row input:focus { border-color: var(--accent); }
        .input-row button { padding: 6px 12px; background: var(--accent); border-radius: 4px; font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
        .input-row button:hover { filter: brightness(1.15); }

        .section-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .channel-list { display: flex; flex-direction: column; gap: 2px; }
        .channel-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; font-size: 13px; }
        .channel-item:hover { background: #222; }
        .channel-item .ch-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .channel-item .ch-star { cursor: pointer; font-size: 14px; color: var(--text-dim); flex-shrink: 0; }
        .channel-item .ch-star.active { color: #ffd700; }
        .channel-item .ch-remove { cursor: pointer; font-size: 12px; color: var(--text-dim); padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
        .channel-item .ch-remove:hover { background: #f44; color: #fff; }
        .fav-item { cursor: pointer; }
        .fav-item:hover { background: #222; }
        .preset-row { display: flex; gap: 4px; }
        .preset-row input { flex: 1; min-width: 0; }
        .preset-row button { flex-shrink: 0; }
        .preset-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .preset-item:hover { background: #222; }
        .preset-item .preset-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .preset-item .preset-channels { font-size: 11px; color: var(--text-dim); }
        .preset-item .preset-del { font-size: 12px; color: var(--text-dim); padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
        .preset-item .preset-del:hover { background: #f44; color: #fff; }
        .reset-btn { padding: 4px 8px; background: #333; border-radius: 4px; font-size: 12px; color: var(--text-dim); align-self: flex-start; }
        .reset-btn:hover { background: #f44; color: #fff; }

        /* Chat */
        #chat-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        #chat-select { margin: 4px 8px; padding: 6px 8px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; font-size: 13px; outline: none; flex-shrink: 0; }
        #chat-select:focus { border-color: var(--accent); }
        #chat-frame { flex: 1; width: 100%; border: none; min-height: 0; }
        #chat-notice { padding: 4px 8px; font-size: 11px; color: var(--text-dim); text-align: center; flex-shrink: 0; border-top: 1px solid var(--border); }

        /* Empty state */
        #empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 24px; padding: 40px; }
        #empty-state h1 { font-size: 28px; font-weight: 700; color: var(--text); }
        #empty-state p { color: var(--text-dim); font-size: 14px; }
        #empty-state .empty-input-row { display: flex; gap: 8px; width: 100%; max-width: 500px; }
        #empty-state .empty-input-row input { flex: 1; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; }
        #empty-state .empty-input-row input:focus { border-color: var(--accent); }
        #empty-state .empty-input-row button { padding: 10px 20px; background: var(--accent); border-radius: 4px; font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; }
        #empty-state .empty-input-row button:hover { filter: brightness(1.15); }
        #empty-section { margin-top: 16px; width: 100%; max-width: 500px; }
        #empty-section h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        #empty-section .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
        #empty-section .tag { padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        #empty-section .tag:hover { border-color: var(--accent); background: #222; }
        #empty-section .tag .tag-remove { font-size: 11px; color: var(--text-dim); margin-left: 4px; }
        #empty-section .tag .tag-remove:hover { color: #f44; }
        .platform-badge { font-size: 10px; padding: 1px 4px; border-radius: 2px; font-weight: 600; margin-left: 2px; }
        .platform-badge.soop { background: #1a6aff; color: #fff; }
        .platform-badge.chzzk { background: #00e676; color: #000; }

        /* Extension overlay */
        #ext-overlay { display: none; flex-direction: column; position: fixed; bottom: 0; right: 0; width: 350px; border-radius: 8px 8px 0 0; padding: 12px 20px 16px; background: #222; border: 1px solid var(--border); border-bottom: none; font-size: 13px; z-index: 200; line-height: 1.6; }
        #ext-overlay .ext-close { align-self: flex-end; font-size: 16px; color: var(--text-dim); cursor: pointer; padding: 2px 6px; border-radius: 4px; }
        #ext-overlay .ext-close:hover { background: #444; color: var(--text); }
        #ext-overlay .ext-btn { margin-top: 12px; padding: 8px 16px; background: var(--accent); border-radius: 4px; text-align: center; cursor: pointer; font-weight: 600; font-size: 13px; }
        #ext-overlay .ext-btn:hover { filter: brightness(1.15); }
    </style>
</head>
<body>
    <div class="app">
        <!-- Empty state (shown when no channels) -->
        <div id="empty-state">
            <h1>멀티뷰</h1>
            <p>숲(SOOP) · 치지직(CHZZK) 방송을 함께 볼 수 있습니다</p>
            <div class="empty-input-row">
                <input type="text" id="empty-input" placeholder="채널 ID 입력 (쉼표/공백으로 여러 개)">
                <button onclick="addFromInput('empty-input')">추가</button>
            </div>
            <div id="empty-section">
                <div id="empty-favs"></div>
                <div id="empty-presets" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- Main stream (top) -->
        <div id="main-stream" style="display:none;"
             ondragover="event.preventDefault(); this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="handleMainDrop(event); this.classList.remove('drag-over')">
            <div id="top-bar">
                <input type="text" id="top-input" placeholder="채널 ID 입력 (쉼표/공백으로 여러 개)">
                <button class="tb-add" onclick="addFromInput('top-input')">추가</button>
                <button class="tb-reset" onclick="resetAll()">초기화</button>
            </div>
        </div>

        <!-- Horizontal resize (main ↔ bottom) -->
        <div id="h-resize"></div>

        <!-- Bottom: subs + sidebar -->
        <div id="bottom-section">
            <div id="sub-streams"></div>

            <div id="sidebar">
                <div id="v-resize"></div>
                <div id="panel-toggle-row">
                    <span>채널 관리</span>
                    <button onclick="togglePanel()" id="panel-toggle-btn">▲</button>
                </div>
                <div id="channel-panel">
                    <div class="input-row">
                        <input type="text" id="sidebar-input" placeholder="채널 ID 입력" onkeydown="if(event.key==='Enter')addFromInput('sidebar-input')">
                        <button onclick="addFromInput('sidebar-input')">추가</button>
                    </div>
                    <div class="section-label">활성 채널</div>
                    <div class="channel-list" id="active-channels"></div>
                    <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
                        <span class="section-label" style="margin:0;">즐겨찾기</span>
                    </div>
                    <div class="channel-list" id="fav-list"></div>
                    <div class="section-label" style="margin-top:4px;">프리셋</div>
                    <div class="preset-row input-row">
                        <input type="text" id="preset-name-input" placeholder="프리셋 이름" onkeydown="if(event.key==='Enter')savePreset()">
                        <button onclick="savePreset()">저장</button>
                    </div>
                    <div class="channel-list" id="preset-list"></div>
                    <button class="reset-btn" onclick="resetAll()">전체 초기화</button>
                </div>
                <div id="chat-section">
                    <select id="chat-select" onchange="switchChat(this.value)">
                        <option value="" data-blank>(채팅 선택)</option>
                    </select>
                    <iframe id="chat-frame"></iframe>
                    <div id="chat-notice">확장 프로그램 미설치 시 읽기 전용</div>
                </div>
            </div>
        </div>

        <!-- Sidebar controls -->
        <div id="sidebar-toggle">
            <button onclick="toggleSidebar()" title="채팅 토글">💬</button>
            <button onclick="switchSide()" id="side-btn" title="좌우 전환">◀</button>
        </div>
    </div>

    <!-- Extension overlay -->
    <div id="ext-overlay">
        <span class="ext-close" onclick="closeExtOverlay()">&times;</span>
        <div id="ext-overlay-text">Mul.Live Plus 확장 프로그램을 설치하면 채팅에서 로그인 기능을 사용할 수 있습니다. 미설치 시 채팅은 읽기 전용입니다.</div>
        <div class="ext-btn" id="ext-overlay-btn" onclick="handleExtBtn()">확장 프로그램 설치</div>
    </div>

    <script>
        // 원본(mul.live)과 동일하게 hasExtension = true 고정
        const hasExtension = true;
        const extensionUrl = /firefox/i.test(navigator.userAgent)
            ? 'https://addons.mozilla.org/addon/mullive/'
            : 'https://chromewebstore.google.com/detail/pahcphmhihleneomklgfbbneokhjiaim';

        function closeExtOverlay() {
            document.getElementById('ext-overlay').style.display = 'none';
            localStorage.setItem('multiview_seen_ext', 'true');
        }

        function showRefreshOverlay() {
            document.getElementById('ext-overlay-text').textContent = '로그인 후 채팅을 새로고침 해주세요.';
            document.getElementById('ext-overlay-btn').textContent = '새로고침';
            document.getElementById('ext-overlay').style.display = 'flex';
        }

        function handleExtBtn() {
            const btn = document.getElementById('ext-overlay-btn');
            if (btn.textContent === '새로고침') {
                document.getElementById('chat-frame').src = document.getElementById('chat-select').value;
            } else {
                window.open(extensionUrl);
            }
            closeExtOverlay();
        }

        if (localStorage.getItem('multiview_seen_ext') !== 'true') {
            document.getElementById('ext-overlay').style.display = 'flex';
        }

        document.addEventListener('securitypolicyviolation', (e) => {
            if (e.blockedURI === 'https://nid.naver.com') {
                window.open('https://nid.naver.com/nidlogin.login');
                showRefreshOverlay();
            }
        });

        // State
        let initChat = true;
        let channels = [];
        let favorites = JSON.parse(localStorage.getItem('multiview_favorites') || '[]');
        let presets = JSON.parse(localStorage.getItem('multiview_presets') || '[]');
        let sidebarOpen = true;
        let panelOpen = true;
        let sidebarSide = localStorage.getItem('multiview_side') || 'right'; // 'left' or 'right'
        let mainH = Number.parseInt(localStorage.getItem('multiview_mainH') || '', 10) || 0;
        let sidebarW = Number.parseInt(localStorage.getItem('multiview_sidebar_w') || '', 10) || 350;
        let dragIdx = -1;

        const BLANK_PAGE = 'data:text/html,<style>body{margin:0;background:%23111;background-image:linear-gradient(45deg,%23191919 25%25,transparent 25%25,transparent 75%25,%23191919 75%25),linear-gradient(45deg,%23191919 25%25,transparent 25%25,transparent 75%25,%23191919 75%25);background-size:20px 20px;background-position:0 0,10px 10px;}</style>';
        const MIN_MAIN_HEIGHT = 120;
        const MIN_BOTTOM_HEIGHT = 140;
        const MIN_SIDEBAR_WIDTH = 240;
        const MAX_SIDEBAR_WIDTH = 700;

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function getAppSize() {
            const app = document.querySelector('.app');
            return {
                height: app?.clientHeight || window.innerHeight
            };
        }

        function shouldShowBottomSection() {
            return sidebarOpen || channels.length > 1;
        }

        function getMainHeightBounds() {
            const { height: totalH } = getAppSize();
            if (!shouldShowBottomSection()) {
                return { min: MIN_MAIN_HEIGHT, max: totalH, totalH };
            }

            const handleH = document.getElementById('h-resize').offsetHeight || 0;
            const maxH = totalH - handleH - MIN_BOTTOM_HEIGHT;
            return {
                min: MIN_MAIN_HEIGHT,
                max: Math.max(MIN_MAIN_HEIGHT, maxH),
                totalH
            };
        }

        function getNormalizedMainHeight(nextHeight = mainH) {
            const { min, max, totalH } = getMainHeightBounds();
            const fallbackHeight = Math.floor(totalH * 0.55);
            return clamp(nextHeight || fallbackHeight, min, max);
        }

        function setupPointerDrag(handle, cursor, { onStart, onMove, onEnd }) {
            let pointerId = null;

            const finish = (e) => {
                if (pointerId === null || e.pointerId !== pointerId) return;
                handle.classList.remove('active');
                handle.releasePointerCapture?.(pointerId);
                pointerId = null;
                document.body.style.removeProperty('user-select');
                document.getElementById('drag-cover')?.remove();
                onEnd?.(e);
            };

            handle.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                e.preventDefault();
                pointerId = e.pointerId;
                handle.setPointerCapture?.(pointerId);
                handle.classList.add('active');
                document.body.style.userSelect = 'none';

                const cover = document.createElement('div');
                cover.id = 'drag-cover';
                cover.style.cssText = `position:fixed;inset:0;z-index:9999;cursor:${cursor};`;
                document.body.appendChild(cover);

                onStart?.(e);
            });

            handle.addEventListener('pointermove', (e) => {
                if (pointerId === null || e.pointerId !== pointerId) return;
                onMove?.(e);
            });

            handle.addEventListener('pointerup', finish);
            handle.addEventListener('pointercancel', finish);
        }

        // Platform detection
        function detectPlatform(id) {
            return /^[0-9a-f]{20,}$/.test(id) ? 'chzzk' : 'soop';
        }

        function getStreamUrl(id, platform) {
            return platform === 'chzzk'
                ? `https://chzzk.naver.com/live/${id}`
                : `https://play.sooplive.com/${id}/direct?fromApi=1`;
        }

        function getChatUrl(id, platform) {
            return platform === 'chzzk'
                ? `https://chzzk.naver.com/live/${id}/chat`
                : `https://play.sooplive.com/${id}?vtype=chat`;
        }

        function parseIds(str) {
            return str.split(/[\s,\/]+/).map(s => s.trim()).filter(Boolean);
        }

        // 닉네임
        function fetchChzzkNickname(id) {
            window.postMessage({ type: 'soopzzk-fetch-chzzk', channelId: id }, '*');
        }
        window.addEventListener('message', (e) => {
            if (e.source !== window) return;
            if (e.data?.type === 'soopzzk-chzzk-result' && e.data.name) {
                updateNickname(e.data.channelId, e.data.name);
            }
        });
        async function fetchSoopNickname(id) {
            try {
                const res = await fetch(`https://chapi.sooplive.com/api/${id}/station`);
                if (res.ok) { const d = await res.json(); return d.station?.user_nick || null; }
            } catch (e) {}
            return null;
        }

        function updateNickname(id, nickname) {
            const ch = channels.find(c => c.id === id);
            if (ch && nickname && ch.nickname !== nickname) {
                ch.nickname = nickname;
                const fav = favorites.find(f => f.id === id);
                if (fav) {
                    fav.nickname = nickname;
                    localStorage.setItem('multiview_favorites', JSON.stringify(favorites));
                }
                renderSidebar();
                updateChatSelect();
                const slot = document.querySelector(`.sub-slot[data-id="${id}"]`);
                if (slot) { const label = slot.querySelector('.sub-label'); if (label) label.textContent = nickname; }
            }
        }

        function editNickname(id) {
            const ch = channels.find(c => c.id === id);
            if (!ch) return;
            const input = prompt('닉네임 입력:', ch.nickname);
            if (input !== null && input.trim()) updateNickname(id, input.trim());
        }

        // Channels
        function addChannels(ids) {
            let added = false;
            for (const id of ids) {
                if (channels.find(c => c.id === id)) continue;
                const platform = detectPlatform(id);
                channels.push({ id, platform, nickname: id });
                added = true;
                if (platform === 'chzzk') fetchChzzkNickname(id);
                else fetchSoopNickname(id).then(n => { if (n) updateNickname(id, n); });
            }
            if (added) render();
        }

        function addFromInput(inputId) {
            const input = document.getElementById(inputId);
            const ids = parseIds(input.value);
            if (ids.length) { addChannels(ids); input.value = ''; }
        }

        function removeChannel(idx) { channels.splice(idx, 1); render(); }
        function resetAll() { channels = []; render(); }

        function promoteToMain(idx) {
            if (idx <= 0 || idx >= channels.length) return;
            const [ch] = channels.splice(idx, 1);
            channels.unshift(ch);
            render();
        }

        function swapChannels(a, b) {
            if (a === b) return;
            [channels[a], channels[b]] = [channels[b], channels[a]];
            render();
        }

        // Favorites
        function toggleFavorite(id) {
            const ch = channels.find(c => c.id === id);
            const existing = favorites.findIndex(f => f.id === id);
            if (existing >= 0) { favorites.splice(existing, 1); }
            else {
                const platform = ch ? ch.platform : detectPlatform(id);
                const nickname = ch ? ch.nickname : id;
                favorites.push({ id, platform, nickname });
            }
            localStorage.setItem('multiview_favorites', JSON.stringify(favorites));
            renderSidebar(); renderEmptyState();
        }
        function isFav(id) { return favorites.some(f => f.id === id); }
        function removeFavorite(id) {
            favorites = favorites.filter(f => f.id !== id);
            localStorage.setItem('multiview_favorites', JSON.stringify(favorites));
            renderSidebar(); renderEmptyState();
        }

        // Presets
        function savePreset() {
            const nameInput = document.getElementById('preset-name-input');
            const name = nameInput.value.trim();
            if (!name || !channels.length) return;
            presets.push({ name, channels: channels.map(c => ({ id: c.id, platform: c.platform, nickname: c.nickname })) });
            localStorage.setItem('multiview_presets', JSON.stringify(presets));
            nameInput.value = '';
            renderSidebar(); renderEmptyState();
        }
        function loadPreset(idx) { const p = presets[idx]; if (!p) return; channels = p.channels.map(c => ({ ...c })); render(); }
        function deletePreset(idx) {
            presets.splice(idx, 1);
            localStorage.setItem('multiview_presets', JSON.stringify(presets));
            renderSidebar(); renderEmptyState();
        }

        // Sidebar
        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
            adjustLayout();
        }
        function togglePanel() {
            panelOpen = !panelOpen;
            document.getElementById('channel-panel').classList.toggle('collapsed-panel', !panelOpen);
            document.getElementById('panel-toggle-btn').textContent = panelOpen ? '▲' : '▼';
        }
        function switchSide() {
            sidebarSide = sidebarSide === 'right' ? 'left' : 'right';
            localStorage.setItem('multiview_side', sidebarSide);
            applySide();
        }
        function applySide() {
            const bottom = document.getElementById('bottom-section');
            bottom.classList.toggle('sidebar-left', sidebarSide === 'left');
            document.getElementById('side-btn').textContent = sidebarSide === 'right' ? '◀' : '▶';
        }

        // Chat
        function switchChat(url) { document.getElementById('chat-frame').src = url; }
        function updateChatSelect() {
            const sel = document.getElementById('chat-select');
            const prev = sel.value;
            sel.innerHTML = '';
            for (const ch of channels) {
                const opt = document.createElement('option');
                opt.value = getChatUrl(ch.id, ch.platform);
                opt.textContent = ch.nickname;
                sel.appendChild(opt);
            }
            const hideOpt = document.createElement('option');
            hideOpt.value = BLANK_PAGE;
            hideOpt.textContent = '(채팅 숨기기)';
            sel.appendChild(hideOpt);
            if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
            else if (channels.length) sel.value = sel.options[0].value;
            else sel.value = BLANK_PAGE;
            switchChat(sel.value);
        }

        function handleMainDrop(e) {
            e.preventDefault();
            const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
            if (isNaN(fromIdx) || fromIdx <= 0) return;
            promoteToMain(fromIdx);
        }

        // Layout
        function adjustLayout() {
            const mainEl = document.getElementById('main-stream');
            const subEl = document.getElementById('sub-streams');
            const bottomEl = document.getElementById('bottom-section');
            const hResize = document.getElementById('h-resize');

            if (!channels.length) return;

            const { height: totalH } = getAppSize();
            const subCount = channels.length - 1;

            if (!shouldShowBottomSection()) {
                bottomEl.style.display = 'none';
                hResize.style.display = 'none';
                mainEl.style.height = totalH + 'px';
                return;
            }

            mainH = getNormalizedMainHeight();
            mainEl.style.height = mainH + 'px';
            bottomEl.style.display = 'flex';
            hResize.style.display = 'block';

            if (subCount === 0) {
                return;
            }

            // Sub streams: optimal grid in available space
            const subAreaW = subEl.clientWidth;
            const subAreaH = bottomEl.clientHeight;
            const n = subCount;

            let bestW = 0, bestH = 0;
            for (let cols = 1; cols <= n; cols++) {
                const rows = Math.ceil(n / cols);
                let maxW = Math.floor(subAreaW / cols);
                let maxH = Math.floor(subAreaH / rows);
                if ((maxW * 9) / 16 < maxH) maxH = Math.floor((maxW * 9) / 16);
                else maxW = Math.floor((maxH * 16) / 9);
                if (maxW > bestW) { bestW = maxW; bestH = maxH; }
            }

            subEl.querySelectorAll('.sub-slot').forEach(s => {
                s.style.width = bestW + 'px';
                s.style.height = bestH + 'px';
            });
        }

        // Render
        function render() {
            const emptyState = document.getElementById('empty-state');
            const mainEl = document.getElementById('main-stream');
            const subEl = document.getElementById('sub-streams');
            const bottomEl = document.getElementById('bottom-section');
            const hResize = document.getElementById('h-resize');

            if (!channels.length) {
                emptyState.style.display = 'flex';
                mainEl.style.display = 'none';
                bottomEl.style.display = 'none';
                hResize.style.display = 'none';
                mainEl.innerHTML = '<div id="top-bar"><input type="text" id="top-input" placeholder="채널 ID 입력 (쉼표/공백으로 여러 개)"><button class="tb-add" onclick="addFromInput(\'top-input\')">추가</button><button class="tb-reset" onclick="resetAll()">초기화</button></div>';
                subEl.innerHTML = '';
                renderEmptyState(); renderSidebar(); updateChatSelect();
                return;
            }

            emptyState.style.display = 'none';
            mainEl.style.display = 'block';

            // Main
            const mainCh = channels[0];
            const currentMainId = mainEl.querySelector('iframe')?.getAttribute('data-id');
            if (currentMainId !== mainCh.id) {
                mainEl.innerHTML = `
                    <div id="top-bar">
                        <input type="text" id="top-input" placeholder="채널 ID 입력 (쉼표/공백으로 여러 개)">
                        <button class="tb-add" onclick="addFromInput('top-input')">추가</button>
                        <button class="tb-reset" onclick="resetAll()">초기화</button>
                    </div>
                    <iframe src="${getStreamUrl(mainCh.id, mainCh.platform)}" name="${mainCh.id}" allowfullscreen data-id="${mainCh.id}"></iframe>
                `;
                document.getElementById('top-input').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') addFromInput('top-input');
                });
            }

            // Subs
            const subChannels = channels.slice(1);
            const existingIds = [...subEl.querySelectorAll('.sub-slot')].map(s => s.getAttribute('data-id'));
            const newIds = subChannels.map(c => c.id);

            if (JSON.stringify(existingIds) !== JSON.stringify(newIds)) {
                subEl.innerHTML = '';
                subChannels.forEach((ch, i) => {
                    const globalIdx = i + 1;
                    const slot = document.createElement('div');
                    slot.className = 'sub-slot';
                    slot.setAttribute('data-id', ch.id);
                    slot.innerHTML = `
                        <iframe src="${getStreamUrl(ch.id, ch.platform)}" name="${ch.id}" allowfullscreen data-id="${ch.id}"></iframe>
                        <div class="sub-toolbar">
                            <span class="sub-label" draggable="true" data-idx="${globalIdx}">${ch.nickname}</span>
                            <button onclick="promoteToMain(${globalIdx})" title="메인으로">&#9650;</button>
                            <button onclick="removeChannel(${globalIdx})" title="제거">✕</button>
                        </div>
                    `;
                    const label = slot.querySelector('.sub-label');
                    label.addEventListener('dragstart', (e) => {
                        dragIdx = globalIdx;
                        e.dataTransfer.setData('text/plain', String(globalIdx));
                        e.dataTransfer.effectAllowed = 'move';
                        setTimeout(() => slot.classList.add('dragging'), 0);
                    });
                    label.addEventListener('dragend', () => { slot.classList.remove('dragging'); dragIdx = -1; });
                    slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drag-over'); });
                    slot.addEventListener('dragleave', () => { slot.classList.remove('drag-over'); });
                    slot.addEventListener('drop', (e) => {
                        e.preventDefault(); e.stopPropagation();
                        slot.classList.remove('drag-over');
                        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                        if (!isNaN(fromIdx)) swapChannels(fromIdx, globalIdx);
                    });
                    subEl.appendChild(slot);
                });
            }

            adjustLayout();
            renderSidebar();
            updateChatSelect();
        }

        function renderSidebar() {
            const activeEl = document.getElementById('active-channels');
            activeEl.innerHTML = channels.map((ch, i) => `
                <div class="channel-item">
                    <span class="ch-name" onclick="editNickname('${ch.id}')" title="클릭하여 닉네임 수정" style="cursor:pointer;">${ch.nickname} <span class="platform-badge ${ch.platform}">${ch.platform === 'chzzk' ? 'CHZZK' : 'SOOP'}</span>${i === 0 ? ' <span style="color:var(--accent);font-size:11px;">메인</span>' : ''}</span>
                    <span class="ch-star ${isFav(ch.id) ? 'active' : ''}" onclick="toggleFavorite('${ch.id}')" title="즐겨찾기">★</span>
                    <span class="ch-remove" onclick="removeChannel(${i})" title="제거">✕</span>
                </div>
            `).join('');

            const favEl = document.getElementById('fav-list');
            favEl.innerHTML = favorites.length ? favorites.map(f => `
                <div class="channel-item fav-item" onclick="addChannels(['${f.id}'])">
                    <span class="ch-name">${f.nickname} <span class="platform-badge ${f.platform}">${f.platform === 'chzzk' ? 'CHZZK' : 'SOOP'}</span></span>
                    <span class="ch-remove" onclick="event.stopPropagation(); removeFavorite('${f.id}')" title="삭제">✕</span>
                </div>
            `).join('') : '<div style="font-size:12px;color:var(--text-dim);padding:2px 6px;">없음</div>';

            const presetEl = document.getElementById('preset-list');
            presetEl.innerHTML = presets.length ? presets.map((p, i) => `
                <div class="preset-item" onclick="loadPreset(${i})">
                    <span class="preset-name">${p.name}</span>
                    <span class="preset-channels">${p.channels.length}개</span>
                    <span class="preset-del" onclick="event.stopPropagation(); deletePreset(${i})" title="삭제">✕</span>
                </div>
            `).join('') : '<div style="font-size:12px;color:var(--text-dim);padding:2px 6px;">없음</div>';
        }

        function renderEmptyState() {
            const favSection = document.getElementById('empty-favs');
            const presetSection = document.getElementById('empty-presets');
            favSection.innerHTML = favorites.length ? `<h3>즐겨찾기</h3><div class="tag-list">${favorites.map(f => `
                <div class="tag" onclick="addChannels(['${f.id}'])">${f.nickname} <span class="platform-badge ${f.platform}">${f.platform === 'chzzk' ? 'CHZZK' : 'SOOP'}</span></div>
            `).join('')}</div>` : '';
            presetSection.innerHTML = presets.length ? `<h3>프리셋</h3><div class="tag-list">${presets.map((p, i) => `
                <div class="tag" onclick="loadPreset(${i})">${p.name} <span style="color:var(--text-dim);font-size:11px;">(${p.channels.length}개)</span>
                    <span class="tag-remove" onclick="event.stopPropagation(); deletePreset(${i})">✕</span></div>
            `).join('')}</div>` : '';
        }

        // SOOP postMessage
        window.addEventListener('message', (e) => {
            if (e.origin !== 'https://play.sooplive.com') return;
            const iframes = document.querySelectorAll('#main-stream iframe, #sub-streams iframe');
            const source = [...iframes].find(f => { try { return e.source === f.contentWindow; } catch { return false; } });
            if (!source) return;
            const id = source.getAttribute('data-id');
            switch (e.data?.cmd) {
                case 'PonReady':
                    if (initChat && hasExtension) {
                        initChat = false;
                        const sel = document.getElementById('chat-select');
                        if (sel.options.length && sel.value !== BLANK_PAGE) {
                            document.getElementById('chat-frame').src = sel.value;
                        }
                    }
                    e.source.postMessage({ cmd: 'Pload', id, mutePlay: false, showChat: hasExtension, autoPlay: true, isAdShow: true, showQualityBox: true, fromApi: '1' }, 'https://play.sooplive.com');
                    break;
                case 'PupdateBroadInfo':
                    if (e.data.data?.nick) updateNickname(id, e.data.data.nick);
                    break;
                case 'showRefreshOverlay':
                    showRefreshOverlay();
                    break;
            }
        });

        // Key events
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if (e.key === 'Escape') resetAll();
        });

        // Window resize
        window.addEventListener('resize', adjustLayout);

        // --- Drag resize: horizontal (main height) ---
        (() => {
            const handle = document.getElementById('h-resize');
            let startY, startH;
            setupPointerDrag(handle, 'row-resize', {
                onStart: (e) => {
                    startY = e.clientY;
                    startH = getNormalizedMainHeight(document.getElementById('main-stream').offsetHeight);
                },
                onMove: (e) => {
                    mainH = getNormalizedMainHeight(startH + (e.clientY - startY));
                    document.getElementById('main-stream').style.height = mainH + 'px';
                    adjustLayout();
                },
                onEnd: () => {
                    localStorage.setItem('multiview_mainH', mainH);
                }
            });
        })();

        // --- Drag resize: vertical (sidebar width) ---
        (() => {
            const handle = document.getElementById('v-resize');
            const sidebar = document.getElementById('sidebar');
            let startX, startW;
            setupPointerDrag(handle, 'col-resize', {
                onStart: (e) => {
                    startX = e.clientX;
                    startW = sidebar.offsetWidth;
                },
                onMove: (e) => {
                    const dx = sidebarSide === 'right' ? (startX - e.clientX) : (e.clientX - startX);
                    sidebarW = clamp(startW + dx, MIN_SIDEBAR_WIDTH, MAX_SIDEBAR_WIDTH);
                    sidebar.style.width = sidebarW + 'px';
                    sidebarOpen = true;
                    adjustLayout();
                },
                onEnd: () => {
                    localStorage.setItem('multiview_sidebar_w', sidebar.offsetWidth);
                }
            });
            sidebarW = clamp(sidebarW, MIN_SIDEBAR_WIDTH, MAX_SIDEBAR_WIDTH);
            sidebar.style.width = sidebarW + 'px';
        })();

        // Enter keys
        document.getElementById('top-input')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') addFromInput('top-input'); });
        document.getElementById('empty-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') addFromInput('empty-input'); });

        // Init
        applySide();
        document.getElementById('chat-frame').src = BLANK_PAGE;
        renderEmptyState();
        renderSidebar();
    </script>
</body>
</html>
